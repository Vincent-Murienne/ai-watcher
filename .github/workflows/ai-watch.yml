name: AI Watcher - Veille Technologique

on:
  schedule:
    - cron: "0 */6 * * *"   # toutes les 6h (00h, 06h, 12h, 18h UTC)
  workflow_dispatch:          # declenchement manuel depuis l'onglet Actions

jobs:
  watch:
    name: Fetch - Summarize - Email
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache du fichier seen.json pour eviter les doublons entre les runs
      - name: Restore seen.json cache
        uses: actions/cache@v4
        with:
          path: data/seen.json
          key: ai-watcher-seen-${{ runner.os }}
          restore-keys: |
            ai-watcher-seen-

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Create data directory
        run: mkdir -p data

      - name: Run AI Watcher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: npm start

      - name: Save seen.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/seen.json
          key: ai-watcher-seen-${{ runner.os }}-${{ github.run_id }}
